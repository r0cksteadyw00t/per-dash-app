<style>
:root{color-scheme:light dark}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;
  background:#f4f1ec;color:#1c1713;font:15px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif;padding:20px}
@media(prefers-color-scheme:dark){body{background:#121110;color:#f2ede6}}
.box{width:100%;max-width:360px;text-align:center}
.mark{font-family:Georgia,'Times New Roman',serif;font-size:30px;margin-bottom:2px}
.mark .d{color:#a82833}
.sub{color:#8d857c;font-size:13px;margin-bottom:22px}
form{display:flex;flex-direction:column;gap:10px}
input[type=password]{font-size:16px;padding:12px 14px;border-radius:12px;border:1px solid #d9d3c8;
  background:#fff;color:inherit;text-align:center}
@media(prefers-color-scheme:dark){input[type=password]{background:#1b1917;border-color:#2e2b26}}
input:focus{outline:2px solid #a82833;outline-offset:1px}
button{font:600 14px system-ui;padding:12px 14px;border-radius:12px;border:0;background:#a82833;color:#fff;cursor:pointer}
button:disabled{opacity:.6}
.remember{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12.5px;color:#8d857c}
.err{color:#c0392f;font-size:13px;min-height:18px;margin-top:2px}
.note{color:#8d857c;font-size:11.5px;margin-top:18px;line-height:1.5}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:s .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes s{to{transform:rotate(360deg)}}
</style></head><body>

const b2a=b=>Uint8Array.from(atob(b),c=>c.charCodeAt(0));
async function derive(pw,salt,iter){
  const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:iter,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
}
async function unlock(pw,persist){
  const err=document.getElementById('err'), go=document.getElementById('go');
  err.textContent=''; go.disabled=true; go.innerHTML='<span class="spin"></span>Unlocking';
  try{
    const key=await derive(pw, b2a(P.salt), P.iter);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2a(P.iv)}, key, b2a(P.ct));
    const html=new TextDecoder().decode(pt);
    if(persist) localStorage.setItem('sa_pw', pw); else sessionStorage.setItem('sa_pw', pw);
    document.open(); document.write(html); document.close();
  }catch(e){
    err.textContent='Wrong passphrase. Try again.';
    go.disabled=false; go.textContent='Unlock';
    localStorage.removeItem('sa_pw'); sessionStorage.removeItem('sa_pw');
  }
}
document.getElementById('f').addEventListener('submit',e=>{e.preventDefault();
  unlock(document.getElementById('pw').value, document.getElementById('rm').checked);});
// auto-unlock if remembered
const saved=localStorage.getItem('sa_pw')||sessionStorage.getItem('sa_pw');
if(saved) unlock(saved, !!localStorage.getItem('sa_pw'));
